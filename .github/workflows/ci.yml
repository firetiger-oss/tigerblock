name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '*' ]

jobs:

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu, macos ]
        include:
          - os: ubuntu
            runner: blacksmith-8vcpu-ubuntu-2204
          - os: macos
            runner: macos-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: useblacksmith/setup-go@v6
        if: matrix.os == 'ubuntu'
        with:
          go-version-file: go.mod

      - uses: actions/setup-go@v5
        if: matrix.os == 'macos'
        with:
          go-version-file: go.mod

      - name: fmt
        run: test -z $(gofmt -l . | head -n 1) || ( gofmt -d . ; exit 1 )

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

      - uses: dominikh/staticcheck-action@v1
        with:
          version: '2025.1.1'
          install-go: false
